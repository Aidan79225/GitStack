name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: GitCrisp-windows
            archive_ext: exe
          - os: macos-latest
            artifact: GitCrisp-macos
            archive_ext: dmg
          - os: ubuntu-latest
            artifact: GitCrisp-linux
            archive_ext: AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 xvfb

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Bake build config (Sentry DSN + version)
        shell: bash
        env:
          DSN: ${{ vars.GITCRISP_SENTRY_DSN }}
          VER: ${{ github.ref_name }}
        run: |
          cat > git_gui/_build_config.py <<EOF
          # Generated by release.yml — do not edit.
          DSN = "${DSN}"
          VERSION = "${VER#v}"
          EOF

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest -v

      - name: Run tests
        if: runner.os != 'Linux'
        run: uv run pytest -v

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller GitCrisp.spec

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$MACOS_KEYCHAIN_PWD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$MACOS_KEYCHAIN_PWD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Sign macOS app
        if: runner.os == 'macOS'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then echo "No signing identity found" && exit 1; fi
          echo "Signing with: $IDENTITY"
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV

          codesign --force --deep --options runtime \
            --sign "$IDENTITY" \
            --entitlements entitlements.plist \
            dist/GitCrisp.app

          echo "Verifying signature..."
          codesign --verify --deep --strict dist/GitCrisp.app

      - name: Notarize macOS app
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent dist/GitCrisp.app dist/GitCrisp.zip

          xcrun notarytool submit dist/GitCrisp.zip \
            --apple-id "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple dist/GitCrisp.app

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg

          create-dmg \
            --volname "GitCrisp" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "GitCrisp.app" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "GitCrisp-macos.dmg" \
            "dist/GitCrisp.app"

          codesign --force --sign "$SIGNING_IDENTITY" GitCrisp-macos.dmg

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $iscc = (Get-Command ISCC.exe -ErrorAction Stop).Source
          & $iscc "/DAppVersion=$tag" installer.iss
          Move-Item GitCrisp-windows-setup.exe "${{ matrix.artifact }}.exe"
        shell: pwsh

      - name: Sign installer (Windows)
        if: runner.os == 'Windows' && vars.SIGNPATH_SIGNING_POLICY_SLUG != '' && vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: "GitCrisp"
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          input-artifact-path: "${{ matrix.artifact }}.exe"
          output-artifact-path: "${{ matrix.artifact }}.exe"
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 600

      - name: Archive build (macOS)
        if: runner.os == 'macOS'
        run: mv GitCrisp-macos.dmg ${{ matrix.artifact }}.dmg

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          APPDIR=AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -r dist/GitCrisp/. "$APPDIR/usr/bin/"

          cat > "$APPDIR/GitCrisp.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=GitCrisp
          Exec=GitCrisp
          Icon=gitcrisp
          Categories=Development;RevisionControl;
          Terminal=false
          EOF

          cp arts/gitcrisp.svg "$APPDIR/gitcrisp.svg"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/GitCrisp" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun "$APPDIR" "${{ matrix.artifact }}.AppImage"

      - name: Cleanup macOS keychain
        if: always() && runner.os == 'macOS'
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm -f $RUNNER_TEMP/build_certificate.p12

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "GitCrisp $tag" \
            --generate-notes \
            artifacts/GitCrisp-windows/GitCrisp-windows.exe \
            artifacts/GitCrisp-macos/GitCrisp-macos.dmg \
            artifacts/GitCrisp-linux/GitCrisp-linux.AppImage
